<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="AI Agent Challenge 주차별 과제 허브 페이지" />
  <title>AI Agent Challenge Hub</title>
  <style>
    :root {
      --bg: #f7f5f1;
      --card: #fffdf9;
      --ink: #1f1f1f;
      --muted: #686868;
      --line: #e7e1d8;
      --accent: #e8a547;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, "Pretendard", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at 10% 10%, #fff8ea, transparent 40%), var(--bg);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .wrap {
      width: 100%;
      max-width: 760px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 32px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
    }
    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.6rem, 4vw, 2.3rem);
      line-height: 1.2;
      letter-spacing: -0.02em;
    }
    p {
      margin: 0 0 24px;
      color: var(--muted);
      line-height: 1.6;
    }
    .list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 12px;
    }
    .list a {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      padding: 16px 18px;
      border: 1px solid var(--line);
      border-radius: 14px;
      text-decoration: none;
      color: var(--ink);
      background: #fff;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .list a:hover {
      transform: translateY(-2px);
      border-color: var(--accent);
      box-shadow: 0 8px 20px rgba(232, 165, 71, 0.2);
    }
    .week {
      font-weight: 600;
    }
    .desc {
      color: var(--muted);
      font-size: 0.92rem;
    }
    .arrow {
      color: var(--accent);
      font-weight: 700;
      white-space: nowrap;
    }
    .foot {
      margin-top: 22px;
      font-size: 0.82rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>AI Agent Challenge</h1>
    <p>주차별 과제 결과물을 빠르게 확인할 수 있는 허브 페이지입니다.</p>

    <ul class="list">
      <li>
        <a href="./landing-page/">
          <span>
            <span class="week">Week 1</span><br />
            <span class="desc">Lumio 제품 소개 랜딩 페이지</span>
          </span>
          <span class="arrow">Open →</span>
        </a>
      </li>
    </ul>

    <div class="foot">Week 2 이후 과제는 같은 형식으로 링크를 추가하면 됩니다.</div>
  </main>
</body>
</html>
